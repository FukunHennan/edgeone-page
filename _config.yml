# EdgeOne Page - shared Hexo configuration
# Language-specific values are defined in _config.zh-CN.yml and _config.en.yml.

# Default local development language
title: EdgeOne Page
subtitle: 现代双语 Hexo 站点
description: 面向腾讯云 EdgeOne Pages 的简体中文和英文双语站点。
keywords:
  - Hexo
  - EdgeOne Pages
  - 简体中文
  - English
author: FukunHennan
language: zh-CN
timezone: Asia/Shanghai

# Default localized path. Production builds override these values per language.
url: https://edgeone-page.edgeone.app/zh-CN
root: /zh-CN/
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Content directories
source_dir: source/zh-CN
public_dir: public/zh-CN
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: []

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
    - edgeone-page.edgeone.app
filename_case: 1
render_drafts: false
post_asset_folder: false
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: "  "
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: "  "

# Homepage
index_generator:
  path: ""
  per_page: 8
  order_by: -date

# Taxonomy
default_category: general
category_map:
tag_map:

# Metadata and time
meta_generator: false
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: date

# Pagination
per_page: 8
pagination_dir: page

# Source filters
include:
exclude:
ignore:
  - "**/*.tmp"
  - "**/.DS_Store"

# Theme
theme: edg-one-page

# Deployment is managed by EdgeOne Pages.
deploy:
  type: ""
