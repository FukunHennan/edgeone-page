# EdgeOne Page - Hexo site configuration
# Documentation: https://hexo.io/docs/configuration.html

# Site identity
title: EdgeOne Page
subtitle: Modern multilingual Hexo theme for EdgeOne Pages
description: A fast, responsive and multilingual Hexo site optimized for Tencent EdgeOne Pages.
keywords:
  - Hexo
  - EdgeOne Pages
  - multilingual
  - responsive
  - blog
author: FukunHennan
language: zh-CN
timezone: Asia/Shanghai

# Public URL
url: https://edgeone-page.edgeone.app
root: /
permalink: posts/:year/:month/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directories
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - README.md

# Writing
new_post_name: :year/:month/:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
    - edgeone-page.edgeone.app
filename_case: 1
render_drafts: false
post_asset_folder: false
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: "  "
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: "  "

# Homepage
index_generator:
  path: ""
  per_page: 8
  order_by: -date

# Taxonomy
default_category: general
category_map:
tag_map:

# Metadata and time
meta_generator: false
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: date

# Pagination
per_page: 8
pagination_dir: page

# Source filters
include:
exclude:
ignore:
  - "**/*.tmp"
  - "**/.DS_Store"

# Theme
theme: edg-one-page

# Deployment is managed by EdgeOne Pages.
deploy:
  type: ""
