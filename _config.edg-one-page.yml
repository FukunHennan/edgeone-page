# EdgeOne Page theme overrides
# Project-specific settings live here so the vendored theme defaults remain reusable.

info:
  title: EdgeOne Page
  subtitle: Modern multilingual publishing for EdgeOne Pages
  author: FukunHennan
  url: https://edgeone-page.edgeone.app

defaults:
  favicon: /images/redefine-favicon.svg
  logo: /images/redefine-logo.svg
  avatar: /images/redefine-avatar.svg

colors:
  primary: "#2563eb"
  secondary: "#14b8a6"
  default_mode: light

global:
  content_max_width: 1120px
  sidebar_width: 230px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: true
    percentage: true
  website_counter:
    url: https://cn.vercount.one/js
    enable: false
    site_pv: true
    site_uv: true
    post_pv: true
  single_page: true
  preloader:
    enable: false
    custom_message: EdgeOne Page
  side_tools:
    gear_rotation: true
    auto_expand: false
  open_graph:
    enable: true
    image: /images/redefine-og.webp
    description: A fast, responsive and multilingual Hexo site optimized for Tencent EdgeOne Pages.
  google_analytics:
    enable: false
    id:

home_banner:
  enable: true
  style: fixed
  image:
    light: /images/wallhaven-wqery6-light.webp
    dark: /images/wallhaven-wqery6-dark.webp
  title: EdgeOne Page
  subtitle:
    text:
      - Fast, modern and multilingual.
      - Designed for Tencent EdgeOne Pages.
      - Open source and easy to customize.
    hitokoto:
      enable: false
      show_author: false
      api: https://v1.hitokoto.cn
    typing_speed: 80
    backing_speed: 50
    starting_delay: 350
    backing_delay: 1600
    loop: true
    smart_backspace: true
  text_color:
    light: "#ffffff"
    dark: "#e5e7eb"
  text_style:
    title_size: 3rem
    subtitle_size: 1.25rem
    line_height: 1.25
  custom_font:
    enable: false
    family:
    url:
  social_links:
    enable: true
    style: center
    links:
      - icon: github
        url: https://github.com/FukunHennan/edgeone-page

navbar:
  auto_hide: true
  color:
    left: "#2563eb"
    right: "#14b8a6"
    transparency: 18
  width:
    home: 1280px
    pages: 1120px
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    Archives:
      path: /archives/
      icon: fa-regular fa-box-archive
    Tags:
      path: /tags/
      icon: fa-regular fa-tags
    Categories:
      path: /categories/
      icon: fa-regular fa-folder
    GitHub:
      path: https://github.com/FukunHennan/edgeone-page
      icon: fa-brands fa-github
  search:
    enable: true
    preload: true

home:
  sidebar:
    enable: true
    position: left
    first_item: info
    announcement: Open-source Hexo publishing for EdgeOne Pages.
    show_on_mobile: true
    links:
      Archives:
        path: /archives/
        icon: fa-regular fa-box-archive
      Tags:
        path: /tags/
        icon: fa-regular fa-tags
      Categories:
        path: /categories/
        icon: fa-regular fa-folder
  article_date_format: YYYY-MM-DD
  excerpt_length: 220
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 4

articles:
  style:
    font_size: 17px
    line_height: 1.75
    image_border_radius: 12px
    image_alignment: center
    image_caption: true
    link_icon: true
    delete_mask: false
    title_alignment: left
  word_count:
    enable: true
    count: true
    min2read: true
  author_label:
    enable: true
    auto: false
    list:
      - Maintainer
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: github-dark
    font:
      enable: false
      family:
      url:
  toc:
    enable: true
    max_depth: 4
    number: false
    expand: true
    init_open: true
  copyright:
    enable: true
    default: cc_by_nc_sa
  lazyload: true
  pangu_js: false
  recommendation:
    enable: true
    title: Recommended reading
    limit: 3
    mobile_limit: 2
    placeholder: /images/wallhaven-wqery6-light.webp
    skip_dirs: []
  share:
    enable: true
    title: Share this article
    native: Share
    copy: Copy link
    email: Email
    copied: Link copied
    failed: Unable to share. Please try again.

comment:
  enable: false
  system: giscus
  config:
    giscus:
      repo: FukunHennan/edgeone-page
      repo_id:
      category:
      category_id:
      mapping: pathname
      strict: 0
      reactions_enabled: 1
      emit_metadata: 0
      lang: zh-CN
      input_position: bottom
      loading: lazy

footer:
  runtime: true
  icon: '<i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.8s; color: #ef4444"></i>'
  start: 2026/04/20 00:00:00
  statistics: true
  customize: '<a href="https://github.com/FukunHennan/edgeone-page" target="_blank" rel="noopener noreferrer">EdgeOne Page on GitHub</a>'
  icp:
    enable: false
    number:
    url:

inject:
  enable: false
  head: []
  footer: []

plugins:
  feed:
    enable: true
  aplayer:
    enable: false
    type: fixed
    audios: []
  mermaid:
    enable: false
    version: "11.4.1"
    theme:
      light: default
      dark: dark

page_templates:
  friends_column: 2
  tags_style: blur
  masonry:
    batch_size: 12
    initial_batch_size: 24

cdn:
  enable: false
  provider: npmmirror
  custom_url:

developer:
  enable: false
