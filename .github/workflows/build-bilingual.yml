name: Build and audit bilingual site

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edgeone-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate JavaScript entrypoints
        run: |
          node --check scripts/head-hygiene.js
          node --check scripts/pwa-runtime.js
          node --check tools/content-records.js
          node --check tools/validate-bilingual.js
          node --check tools/new-bilingual-post.js
          node --check tools/postprocess-bilingual.js
          node --check tools/output-hash.js
          node --check tools/finalize-service-worker.js
          node --check tools/build-bilingual.js
          node --check tools/audit-production.js

      - name: Build and audit production output
        run: npm run check

      - name: Upload generated site
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edgeone-public-${{ github.sha }}
          path: public
          if-no-files-found: error
          retention-days: 7
